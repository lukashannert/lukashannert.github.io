  :root {

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {

    color: var(--text);

    font-size: 12pt;
    font-weight: 300;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding-top: 60px;

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: var(--topbar);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.8rem;
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    text-decoration: none;
  }
  .topbar-logo {
    height: 28px;
    width: auto;
    fill: #ffffff;
    display: block;
  }
  .lang-toggle {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Roboto', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #ffffff;
    padding: 0;
    transition: color 0.2s;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }
  .card {
    background: var(--surface);
    max-width: 500px;
    width: 100%;
    padding: clamp(2.5rem, 7vw, 3.8rem);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: fadeIn 0.65s ease both;
  }
  .eyebrow {
    font-family: 'Roboto', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 0.75rem;
  }
  .message {
    font-family: 'Roboto', sans-serif;
    font-size: 12pt;
    font-weight: 300;
    line-height: 1.78;
    color: var(--text);
    max-width: 275px;
    margin-bottom: 2.4rem;
    letter-spacing: 0.01em;
  }
  .message strong { color: var(--text); font-weight: 500; }
  .contact-link {
    display: inline-block;
    font-family: 'Roboto', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #ffffff;
    background: #000000;
    padding: 0.82rem 2rem;
    text-decoration: none;
    transition: background 0.22s, color 0.22s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .contact-link:focus { outline: none; }

  footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0.85rem;
    padding: 1.6rem 1.5rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
    opacity: 0;
    animation: fadeIn 0.65s ease 0.45s both;
  }
  footer a {
    font-family: 'Roboto', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-copy {
    font-family: 'Roboto', sans-serif;
    font-size: 0.6rem;
    font-weight: 300;
    letter-spacing: 0.07em;
    color: var(--link);
  }

  @media (hover: hover) {
    .lang-toggle:hover { color: var(--accent); }
    .contact-link:hover { background: var(--accent); color: #ffffff; }
    footer a:hover { color: var(--accent); }
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>

<script>
const t = {
  de: {
    title:     'formfaktor3d.de',
    eyebrow:   '// Domain-Status',
    message:   'Die Domain <strong>formfaktor3d.de</strong> ist bereits registriert.',
    cta:       'Kontakt aufnehmen',
    copyright: '© 2026 FORMFAKTOR 3D-Druck Lukas Hannert – Alle Rechte vorbehalten',
    imprint:   'Impressum'
  },
  en: {
    title:     'formfaktor3d.de',
    eyebrow:   '// Domain Status',
    message:   'The domain <strong>formfaktor3d.de</strong> is already registered.',
    cta:       'Get in touch',
    copyright: '© 2026 FORMFAKTOR 3D-Druck Lukas Hannert – All rights reserved',
    imprint:   'Legal Notice'
  }
};

let currentLang = 'de';

function toggleLang() {
  setLang(currentLang === 'de' ? 'en' : 'de');
}

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.title = t[lang].title;
  const toggle = document.getElementById('langToggle');
  if (toggle) toggle.textContent = lang === 'de' ? 'EN' : 'DE';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t[lang][el.dataset.i18n];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    el.innerHTML = t[lang][el.dataset.i18nHtml];
  });
  localStorage.setItem('ff-lang', lang);
}

(function init() {
  const saved   = localStorage.getItem('ff-lang');
  const browser = navigator.language && navigator.language.startsWith('en') ? 'en' : 'de';
  setLang(saved || browser);
})();
</script>

<script>
(function() {
  if (!('ontouchstart' in window)) return;
  var A = '#85AFFF';
  var map = [
    { q: '.lang-toggle',  p: 'color',      r: '#ffffff' },
    { q: '.contact-link', p: 'background', r: '#000000' },
    { q: 'footer a',      p: 'color',      r: '#000000' }
  ];
  document.addEventListener('touchend', function(e) {
    for (var i = 0; i < map.length; i++) {
      var el = e.target.closest(map[i].q);
      if (!el) continue;
      (function(el, p, r) {
        el.style.transition = 'none';
        el.style[p] = A;
        requestAnimationFrame(function() { requestAnimationFrame(function() {
          el.style.transition = p + ' 2s ease';
          el.style[p] = r;
          setTimeout(function() { el.style.transition = ''; el.style[p] = ''; }, 2200);
        }); });
      })(el, map[i].p, map[i].r);
      break;
    }
  }, { passive: true });
})();
</script>
